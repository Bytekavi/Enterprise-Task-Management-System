services:
  api:
    build: .
    ports: ["8080:8080"]
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/task_management
      POSTGRES_USER: task_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-password}
      JWT_SECRET: ${JWT_SECRET:-development-secret-change-this-before-production}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  analytics:
    build: ./analytics
    ports: ["8081:8081"]
    environment:
      DATABASE_URL: postgresql://task_app:${POSTGRES_PASSWORD:-local-password}@db:5432/task_management
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-development-internal-token-change-me}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: task_management
      POSTGRES_USER: task_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_app -d task_management"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports: ["5432:5432"]

volumes:
  postgres_data:

