spring:
  application:
    name: enterprise-task-management
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/task_management}
    username: ${POSTGRES_USER:task_app}
    password: ${POSTGRES_PASSWORD:local-password}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:30}
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

security:
  jwt:
    secret: ${JWT_SECRET:development-secret-change-this-before-production}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:30}

database:
  rls-enabled: ${DATABASE_RLS_ENABLED:true}
